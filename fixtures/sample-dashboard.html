<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sales Dashboard</title>
</head>
<body>
  <h1>Sales Dashboard</h1>
  <div class="metric">
    <span class="label">Revenue</span>
    <span data-value="125000">$125,000</span>
  </div>
  <div class="stat">
    <span class="label">New Users</span>
    <span>3842</span>
  </div>
  <div class="card">
    <h3>Conversion Rate</h3>
    <p>4.7%</p>
  </div>
  <div class="panel">
    <h3>Top Products</h3>
    <ol>
      <li>Widget Pro — 1250 units</li>
      <li>Gadget Plus — 890 units</li>
      <li>Super Tool — 650 units</li>
    </ol>
  </div>
  <div class="metric">
    <span class="label">Avg Order</span>
    <span>$89.50</span>
  </div>
  <a href="https://example.com/reports">View Full Report</a>
  <a href="https://example.com/export">Export CSV</a>
</body>
</html>
